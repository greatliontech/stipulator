name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet github.com/greatliontech/stipulator/...

      - name: gofmt check
        run: test -z "$(gofmt -l . | grep -v testdata)"

      - name: Tidy check (per module — workspace CI cannot see drift)
        run: |
          go mod tidy -diff
          (cd bindingsurface && go mod tidy -diff)
          (cd stipulate && go mod tidy -diff)
          (cd stipulate/structural && go mod tidy -diff)
      - name: Test
        # Suite health is a broader check than the gate: a failing unbound
        # test breaks no binding, so the gate alone could pass on a red
        # suite.
        run: go test -race -timeout=40m github.com/greatliontech/stipulator/...
      - name: Gate
        run: go run ./cmd/stipulator gate
      - name: Prune lint
        # No resolved gap lingering. --no-test evaluates unwitnessed, so a
        # gap resolved only by an executed witness is invisible to this
        # lint; `stipulator check` reports such residue from its witnessed
        # pass.
        run: go run ./cmd/stipulator prune --check --no-test
