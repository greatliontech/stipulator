name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet github.com/greatliontech/stipulator/...

      - name: gofmt check
        run: test -z "$(gofmt -l . | grep -v testdata)"

      - name: Tidy check (per module — workspace CI cannot see drift)
        run: |
          go mod tidy -diff
          (cd bindingsurface && go mod tidy -diff)
          (cd stipulate && go mod tidy -diff)
          (cd stipulate/structural && go mod tidy -diff)
      - name: Check
        # One pass, one verdict: compiles the corpus, executes the accepted
        # test policy once (every workspace member, race-enabled), verifies
        # bindings against that same execution, evaluates coverage and
        # gaps, and reports prune residue. Suite health and witness
        # evidence derive from the same single execution, so a witness
        # failure occurs inside the run whose health the verdict judged —
        # and a gap resolved only by an executed witness surfaces as prune
        # residue here, which no unwitnessed lint could see.
        run: go run ./cmd/stipulator check
