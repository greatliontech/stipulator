name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet github.com/greatliontech/stipulator/...

      - name: Tidy check (per module — workspace CI cannot see drift)
        run: |
          go mod tidy -diff
          (cd stipulate && go mod tidy -diff)
          (cd stipulate/structural && go mod tidy -diff)
      - name: Test
        # Suite health is a broader check than the gate: a failing unbound
        # test breaks no binding, so the gate alone could pass on a red
        # suite.
        run: go test -race github.com/greatliontech/stipulator/...
      - name: Gate
        run: go run ./cmd/stipulator gate
      - name: Fmt lint
        # Indexes current, no resolved gap lingering. --no-test: the gate
        # step already witnessed this tree.
        run: go run ./cmd/stipulator fmt --check --no-test
