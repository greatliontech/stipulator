version: "3"

tasks:
  default:
    deps: [check]

  build:
    desc: Build all packages, across all workspace modules
    cmds:
      - go build github.com/greatliontech/stipulator/...
      - go build github.com/greatliontech/stipulator/bindingsurface/...

  test:
    desc: "Diagnostic: run the test suite directly (the canonical verdict is `task check`)"
    cmds:
      - go test -race -timeout=40m github.com/greatliontech/stipulator/...
      - go test -race -timeout=40m github.com/greatliontech/stipulator/bindingsurface/...

  vet:
    desc: Static analysis, across all workspace modules
    cmds:
      - go vet github.com/greatliontech/stipulator/...
      - go vet github.com/greatliontech/stipulator/bindingsurface/...

  generate:
    desc: Regenerate protobuf code
    cmds:
      - buf lint
      - buf generate
      - cd bindingsurface && buf lint
      - cd bindingsurface && buf generate

  gate:
    desc: "Diagnostic: the gate verdict alone (the canonical verdict is `task check`)"
    cmds:
      - go run ./cmd/stipulator gate

  verify:
    desc: "Diagnostic: check records against the corpus and code"
    cmds:
      - go run ./cmd/stipulator verify

  pin:
    desc: Backfill binding content and shape pins
    cmds:
      - go run ./cmd/stipulator pin

  install:
    desc: Install stipulator to ~/.local/bin with zsh completion
    cmds:
      - mkdir -p $HOME/.local/bin $HOME/.local/share/zsh/site-functions
      - go build -o $HOME/.local/bin/stipulator ./cmd/stipulator
      - $HOME/.local/bin/stipulator completion zsh > $HOME/.local/share/zsh/site-functions/_stipulator
      - echo "note - ensure fpath includes ~/.local/share/zsh/site-functions before compinit"

  prune:
    desc: Delete resolved gap records
    cmds:
      - go run ./cmd/stipulator prune

  fmt-check:
    desc: gofmt cleanliness across all workspace modules
    cmds:
      - test -z "$(gofmt -l . | grep -v testdata)"

  tidy-check:
    desc: Every module ships a tidy go.mod/go.sum (workspace-mode CI cannot see per-module drift)
    cmds:
      - go mod tidy -diff
      - cd bindingsurface && go mod tidy -diff
      - cd stipulate && go mod tidy -diff
      - cd stipulate/structural && go mod tidy -diff

  check:
    desc: Everything CI runs — hygiene plus the one unified verdict
    deps: [vet]
    cmds:
      - task: fmt-check
      - task: tidy-check
      # One pass, one verdict: compiles the corpus, executes the accepted
      # test policy once (every workspace member), verifies bindings
      # against that same execution, evaluates coverage and gaps, and
      # reports prune residue — suite health and witness evidence never
      # come from separate runs.
      - go run ./cmd/stipulator check
