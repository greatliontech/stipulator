version: "3"

tasks:
  default:
    deps: [check]

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  test:
    desc: Run the test suite with the race detector
    cmds:
      - go test -race ./...

  vet:
    desc: Static analysis
    cmds:
      - go vet ./...

  generate:
    desc: Regenerate protobuf code
    cmds:
      - buf lint
      - buf generate

  gate:
    desc: Coverage buckets and the gate verdict (compiles the corpus, runs tests, verifies records)
    cmds:
      - go run ./cmd/stipulator gate

  verify:
    desc: Check records against the corpus and code
    cmds:
      - go run ./cmd/stipulator verify

  pin:
    desc: Backfill binding content and shape pins
    cmds:
      - go run ./cmd/stipulator pin

  install:
    desc: Install stipulator to ~/.local/bin with zsh completion
    cmds:
      - mkdir -p $HOME/.local/bin $HOME/.local/share/zsh/site-functions
      - go build -o $HOME/.local/bin/stipulator ./cmd/stipulator
      - $HOME/.local/bin/stipulator completion zsh > $HOME/.local/share/zsh/site-functions/_stipulator
      - echo "note - ensure fpath includes ~/.local/share/zsh/site-functions before compinit"

  check:
    desc: Everything CI runs
    deps: [vet]
    cmds:
      - task: test
      - task: gate
