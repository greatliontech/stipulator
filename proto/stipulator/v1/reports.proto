edition = "2023";

package stipulator.v1;

option go_package = "github.com/greatliontech/stipulator/gen/stipulator/v1;stipulatorv1";

import "stipulator/v1/ir.proto";
import "stipulator/v1/records.proto";

// Report messages: the wire forms of verification and coverage results.
// Reports are always derived — computed fresh from the tree at every trust
// boundary and never persisted as inputs.

// Resolution classifies a backend's answer for a symbol reference.
enum Resolution {
  RESOLUTION_UNSPECIFIED = 0;
  // No backend was available for the binding.
  RESOLUTION_UNVERIFIED = 1;
  RESOLUTION_RESOLVED = 2;
  RESOLUTION_NOT_FOUND = 3;
  RESOLUTION_GENERATED_FILE = 4;
}

// ShapeState classifies a resolved binding's shape pin.
enum ShapeState {
  SHAPE_STATE_UNSPECIFIED = 0;
  // The binding did not resolve, so no comparison happened.
  SHAPE_STATE_UNKNOWN = 1;
  SHAPE_STATE_UNPINNED = 2;
  SHAPE_STATE_MATCH = 3;
  SHAPE_STATE_MISMATCH = 4;
}

// TestOutcome is the witnessed outcome of a bound test.
enum TestOutcome {
  TEST_OUTCOME_UNSPECIFIED = 0;
  // No outcome observed in a witnessed run: unwitnessed, reads as broken.
  TEST_OUTCOME_NOT_RUN = 1;
  TEST_OUTCOME_PASSED = 2;
  TEST_OUTCOME_FAILED = 3;
  TEST_OUTCOME_SKIPPED = 4;
}

// WitnessClass classifies what a bound test quantifies over.
enum WitnessClass {
  WITNESS_CLASS_UNSPECIFIED = 0;
  WITNESS_CLASS_EXAMPLE = 1;
  WITNESS_CLASS_PROPERTY = 2;
  WITNESS_CLASS_ANALYZER_PROOF = 3;
}

// Problem is a verification error; any problem fails a run.
message Problem {
  string path = 1;
  string message = 2;
}

// BindingResult is the verified state of one binding.
message BindingResult {
  string path = 1;
  string requirement_id = 2;
  string symbol = 3;
  string backend = 4;
  BindingRole role = 5;
  bool content_pinned = 6;
  Resolution resolution = 7;
  ShapeState shape = 8;
  TestOutcome test_outcome = 9;
  WitnessClass witness_class = 10;
  bool race_enabled = 11;
}

// RegistrationResult is a cross-checked runtime coverage claim.
message RegistrationResult {
  string package = 1;
  string test = 2;
  string requirement_id = 3;
  TestOutcome outcome = 4;
}

// VerifyReport is the outcome of a verification run.
message VerifyReport {
  repeated Problem problems = 1;
  repeated BindingResult results = 2;
  repeated RegistrationResult registrations = 3;
  // Signatures classify each changed requirement's shape against the
  // record pins — the baseline; no verification outcome is persisted
  // (REQ-gate-change-signature).
  repeated ChangeSignature signatures = 4;
}

// ChangeSignature labels one requirement's change shape.
message ChangeSignature {
  string requirement_id = 1;
  SignatureLabel label = 2;
  // Evidence names the observations behind the label, human-readable.
  repeated string evidence = 3;
}

// SignatureLabel is the change-signature vocabulary.
enum SignatureLabel {
  SIGNATURE_LABEL_UNSPECIFIED = 0;
  // Structure moved while every behavior witness stayed green.
  SIGNATURE_LABEL_REARCHITECTURE = 1;
  // A behavior witness failed while the requirement's contract text is
  // unchanged — red with no corresponding spec delta.
  SIGNATURE_LABEL_SEMANTIC_DRIFT = 2;
}

// Bucket classifies a requirement's coverage.
enum Bucket {
  BUCKET_UNSPECIFIED = 0;
  BUCKET_UNCOVERED = 1;
  BUCKET_STALE = 2;
  BUCKET_BROKEN = 3;
  BUCKET_COVERED = 4;
  // A MAY requirement with no bindings.
  BUCKET_EXEMPT = 5;
  // Satisfied only by an attestation on a cell that admits one: the
  // weakest evidence, rendered distinctly, never folded into covered.
  BUCKET_ATTESTED = 6;
}

// GapState classifies a gap record.
enum GapState {
  GAP_STATE_UNSPECIFIED = 0;
  GAP_STATE_OPEN = 1;
  GAP_STATE_DUE = 2;
  GAP_STATE_RESOLVED = 3;
}

// RequirementCoverage is one requirement's evaluated bucket.
message RequirementCoverage {
  string id = 1;
  ClauseKind kind = 2;
  Keyword keyword = 3;
  Bucket bucket = 4;
  repeated string reasons = 5;
}

// GapReport is one gap record's evaluated state.
message GapReport {
  string path = 1;
  string requirement_id = 2;
  GapState state = 3;
}

// CoverageReport is the coverage evaluation and gate verdict. There are
// deliberately no aggregate ratios: the verdict is the violation set.
message CoverageReport {
  repeated RequirementCoverage requirements = 1;
  repeated GapReport gaps = 2;
  // Red requirements no gap names; the gate fails exactly when non-empty.
  repeated string violations = 3;
  bool gate_passes = 4;
  // Active manifest policy overrides, human-readable and canonically
  // ordered: contract-tier configuration is surfaced in every coverage
  // output, never applied silently.
  repeated string policy_overrides = 5;
}

// Seed is a bound symbol seeding code context for a requirement set.
message Seed {
  string requirement_id = 1;
  string backend = 2;
  string symbol = 3;
  BindingRole role = 4;
}

// Decl is one declaration fact from a code slice.
message Decl {
  string package = 1;
  string name = 2;
  // The declaration rendered by the backend's object printer.
  string declaration = 3;
  string shape_hash = 4;
}

// ContextReport carries the context facts for a requirement set: seeds
// from the closure's bindings, and the slice of declarations they reach.
message ContextReport {
  repeated Seed seeds = 1;
  repeated Decl declarations = 2;
}

// Dossier is one requirement's orientation view, assembled from the
// compiled corpus and the record stores in one call: no consumer should
// need to know the record stores' file layout to ask "tell me
// everything about REQ-X".
message Dossier {
  // Requirement is the compiled view: canonical text, kind, keyword,
  // content hash, source.
  Requirement requirement = 1;
  // Coverage is the requirement's bucket with its reasons.
  RequirementCoverage coverage = 2;
  // Gap is the open gap record, when one names the requirement.
  Gap gap = 3;
  // Attestation is the judgment record, when one names the requirement.
  RequirementAttestation attestation = 4;
  // Bindings are the verified per-binding rows: symbol, role, witness
  // class, pin freshness, outcome.
  repeated BindingResult bindings = 5;
  // Hardening rolls up each bound symbol's kill-sheet.
  repeated HardeningRollup hardening = 6;
  // Seeds are the closure's seed symbols (REQ-context-seeds).
  repeated Seed seeds = 7;
  // GapState is the gap record's evaluated state, so a resolved gap
  // beside a covered bucket explains itself.
  GapState gap_state = 8;
}

// HardeningRollup is one symbol's kill-sheet, summarized.
message HardeningRollup {
  string symbol = 1;
  int32 mutants = 2;
  int32 killed = 3;
  int32 survivors = 4;
  int32 attested = 5;
}

// DossierReport is the context operation's answer, one dossier per
// requested requirement.
message DossierReport {
  repeated Dossier dossiers = 1;
  // Problems are the verification problems of the run that assembled
  // the dossiers: orientation over a store that fails verification must
  // say so, or first-wins picks render without the problem that
  // explains them.
  repeated Problem problems = 3;
  // Declarations carry the requested requirements' code-slice frontier
  // when the caller asked for it — the expensive leg, off by default.
  repeated Decl declarations = 2;
}

// PartitionComponent is one candidate work unit: requirements whose
// closures intersect, with their seeds and touched packages.
message PartitionComponent {
  repeated string requirement_ids = 1;
  repeated Seed seeds = 2;
  repeated string packages = 3;
}

// PartitionOverlap reports two components sharing packages: fan them out
// sequentially, not in parallel.
message PartitionOverlap {
  int32 a = 1;
  int32 b = 2;
  repeated string packages = 3;
}

// PartitionReport is the candidate-partition derivation. Selection and
// ordering are deliberately absent: they belong to the caller.
message PartitionReport {
  repeated PartitionComponent components = 1;
  repeated PartitionOverlap overlaps = 2;
}

// HardenResult is one target's outcome in a hardening run.
message HardenResult {
  Hardening record = 1;
  // Cached: the stored record's pins (body hash, witness set) matched;
  // no mutants ran.
  bool cached = 2;
  // SkippedNoTests: the target has no bound witnesses to kill mutants.
  bool skipped_no_tests = 3;
  // SkippedNotFunction: the symbol resolves but has no function body (a
  // type or variable implements-binding) — nothing to mutate.
  bool skipped_not_function = 4;
}

// HardenReport is the outcome of a hardening run — exploration output,
// never gate input.
message HardenReport {
  repeated HardenResult results = 1;
}
