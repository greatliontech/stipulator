edition = "2023";

package stipulator.v1;

option go_package = "github.com/greatliontech/stipulator/gen/stipulator/v1;stipulatorv1";

import "stipulator/v1/execution.proto";
import "stipulator/v1/reports.proto";

// CheckResult is the unified check operation's one answer, derived from a
// single evaluation pass — compilation, one execution of the accepted
// test policy, binding verification, coverage, gap evaluation, and prune
// residue. The default pass takes witness evidence from served records
// plus selective execution; the health-judged pass executes the whole
// policy. Every human rendering is a projection of this message.
message CheckResult {
  // The one verdict: false exactly when compilation fails, verification
  // reports problems, suite health is unhealthy, an undeclared red
  // requirement exists, or prune residue remains.
  bool passed = 1;
  // Compilation problems; non-empty means the corpus did not compile and
  // the later sections are absent.
  repeated Problem compile_problems = 2;
  // The policy execution: suite health, per-test outcomes, completeness
  // findings, and failure diagnostics — the failed and degraded witness
  // diagnostics ride here, keyed by test.
  ExecutionReport execution = 3;
  // Per-binding verification with registrations and change signatures.
  VerifyReport verify = 4;
  // Coverage buckets, gap evaluation, violations, and the gate verdict
  // inputs.
  CoverageReport coverage = 5;
  // Paths of resolved gap records still on disk — the residue the prune
  // operation deletes, echoed from the coverage gap evaluation so
  // consumers need no join; the verdict fails while non-empty.
  repeated string prune_residue = 6;
  // The accepted test policy failed to load, parse, or validate. Set means
  // no execution happened and the execution, verify, and coverage sections
  // are absent; the verdict fails — witness execution consumes the
  // committed policy record, never an assumed invocation.
  Problem policy_problem = 7;
  // Top-level tests this pass executed. Under the health-judged form the
  // whole policy runs and nothing is served; under the default
  // witness-evidence form only the stale remainder executes.
  int32 tests_executed = 8;
  // Executed tests whose freshness records could not be published for
  // later freshness-serving consumers; they run again next time. A
  // silently shrinking cache reads as covered — the count keeps the cost
  // visible.
  int32 tests_uncacheable = 9;
  // The freshness-publication fault when record publication was disabled
  // whole; witness evidence stands — and suite health with it under the
  // health-judged form — only reuse is lost.
  string witness_publication_degraded = 10;
  // The evidence class that produced the verdict: true means the
  // health-judging whole-policy execution (suite health rides execution);
  // false means the default witness-evidence pass — served records plus
  // witness-only selective execution of the stale remainder — which claims
  // no suite health and carries no execution report.
  bool suite_health_judged = 11;
  // Top-level tests served from proven-fresh witness records instead of
  // executing. Always zero under the health-judged form: a health-judged
  // invocation executes whole.
  int32 tests_served = 12;
  // Per-test re-execution attribution: for each re-executed top-level
  // test that held prior witness evidence, why serving refused it - the
  // stale variant's verdict reason, movers named. Cold subjects are
  // absent: their cause is the absence of a record. Always empty under
  // the health-judged form, which never serves, and under a degraded
  // freshness path, where the degradation is named globally and per
  // test in uncacheable_reasons.
  map<string, string> executed_reasons = 16;
  // Per-test uncacheable attribution: for each executed top-level test
  // whose record could not publish - and each expected witness subject
  // the run denied execution outright - the leg that refused: the sealed
  // observation's reason, the refused proof's, the missing granting
  // process, the post-run drift with its moved inputs named. Human
  // renderings aggregate; the per-test map is the machine surface. The
  // map's size and tests_uncacheable answer different questions: denied
  // subjects attribute without executing, so the map can exceed the
  // count and be non-empty at zero.
  map<string, string> uncacheable_reasons = 15;
  // Failure diagnostics for the witness-evidence form, where no
  // execution report exists to carry them: the same typed rows the
  // execution report would hold — disposition, truncation, and retained
  // output intact, so a degraded execution stays distinct from an
  // assertion failure (REQ-check-diagnostics). Empty under the
  // health-judged form.
  repeated FailureDiagnostic witness_diagnostics = 13;
}

// CheckSummary is the check operation's summary view: the verdict with
// the counts and red entries an agent acts on, every reason map
// aggregated to a bounded histogram, diagnostic bodies reduced to
// subject headings. A projection of CheckResult — never a second
// derivation — sized for an agent's context window where the full
// result is not (REQ-mcp-response-contract).
message CheckSummary {
  bool passed = 1;
  // The evidence class (REQ-check-verdict): true means the health-judged
  // whole-policy execution; false the witness-evidence serving form.
  bool suite_health_judged = 2;
  // Suite health under the health-judged form; meaningless when
  // suite_health_judged is false.
  bool suite_healthy = 3;
  int32 tests_served = 4;
  int32 tests_executed = 5;
  int32 tests_uncacheable = 6;
  // Reason histograms: distinct reason -> count, aggregated from the
  // full result's per-test maps. The per-test attribution rides only
  // the full view.
  map<string, int32> uncacheable_reason_counts = 7;
  map<string, int32> executed_reason_counts = 8;
  // Compilation and policy problems, verbatim — a summary that hides
  // why the tree cannot even evaluate would force a second call.
  repeated Problem compile_problems = 9;
  Problem policy_problem = 10;
  int32 verify_problems = 11;
  // Binding hygiene counts, defined exactly as verification defines
  // them: stale is a row whose content pin is unset or moved, broken is
  // a row whose symbol did not resolve, shape_mismatch a resolved row
  // whose shape pin disagrees — the same axes VerifySummary counts,
  // never a third classification.
  int32 bindings_stale = 12;
  int32 bindings_broken = 13;
  int32 bindings_shape_mismatch = 24;
  bool gate_passes = 14;
  // Red coverage rows: identifier, bucket word, and first reason. Capped;
  // reds_omitted counts the remainder so truncation is never silent.
  repeated CheckRedRow reds = 15;
  int32 reds_omitted = 16;
  int32 gaps_open = 17;
  int32 gaps_due = 18;
  int32 gaps_resolved = 19;
  // Capped like the red rows; the omitted counters keep every
  // truncation loud.
  repeated string violations = 20;
  int32 violations_omitted = 25;
  repeated string prune_residue = 21;
  // Failed or degraded witnesses as disposition-prefixed subject
  // headings; retained output rides only the full view. Capped, with
  // the remainder counted.
  repeated string witness_failure_headings = 22;
  int32 witness_failure_headings_omitted = 26;
  string witness_publication_degraded = 23;
}

// CheckRedRow is one red coverage row in the summary: enough to act on
// without the full per-requirement array.
message CheckRedRow {
  string id = 1;
  string bucket = 2;
  string reason = 3;
}
