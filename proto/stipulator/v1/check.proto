edition = "2023";

package stipulator.v1;

option go_package = "github.com/greatliontech/stipulator/gen/stipulator/v1;stipulatorv1";

import "stipulator/v1/execution.proto";
import "stipulator/v1/reports.proto";

// CheckResult is the unified check operation's one answer, derived from a
// single evaluation pass — compilation, one execution of the accepted
// test policy, binding verification, coverage, gap evaluation, and prune
// residue. Every human rendering is a projection of this message.
message CheckResult {
  // The one verdict: false exactly when compilation fails, verification
  // reports problems, suite health is unhealthy, an undeclared red
  // requirement exists, or prune residue remains.
  bool passed = 1;
  // Compilation problems; non-empty means the corpus did not compile and
  // the later sections are absent.
  repeated Problem compile_problems = 2;
  // The policy execution: suite health, per-test outcomes, completeness
  // findings, and failure diagnostics — the failed and degraded witness
  // diagnostics ride here, keyed by test.
  ExecutionReport execution = 3;
  // Per-binding verification with registrations and change signatures.
  VerifyReport verify = 4;
  // Coverage buckets, gap evaluation, violations, and the gate verdict
  // inputs.
  CoverageReport coverage = 5;
  // Paths of resolved gap records still on disk — the residue the prune
  // operation deletes, echoed from the coverage gap evaluation so
  // consumers need no join; the verdict fails while non-empty.
  repeated string prune_residue = 6;
}
